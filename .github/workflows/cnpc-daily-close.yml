name: CNPC Daily Close

on:
  schedule:
    # 16:00 Asia/Shanghai, Monday-Friday.
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Verify checked-out scripts
        run: |
          echo "=== fetch_cnpc_close.py head ==="
          head -n 40 fetch_cnpc_close.py
          echo "=== search key functions ==="
          grep -n "fetch_latest" fetch_cnpc_close.py || true
          grep -n "YAHOO_URL\|fetch_yahoo_chart\|fallback_previous_close" fetch_cnpc_close.py || true
          echo "=== python syntax check ==="
          python -m py_compile fetch_cnpc_close.py
          python -m py_compile generate_cnpc_report.py
      - name: Fetch CNPC daily close
        run: python fetch_cnpc_close.py

      - name: Generate CNPC daily report
        run: python generate_cnpc_report.py

      - name: Commit daily close and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cnpc_daily_close.json cnpc_daily_report.md
          if git diff --cached --quiet; then
            echo "No CNPC daily close or report changes to commit"
          else
            git commit -m "Update CNPC daily close and report"
            git push
          fi
